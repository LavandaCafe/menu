<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Import Menu</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    padding:40px;
}

button{
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
}

#status{
    margin-top:25px;
    white-space:pre-line;
}
</style>

</head>
<body>

<h2>Firestore Menu Importer</h2>

<button id="upload">
Upload Menu
</button>

<div id="status"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getFirestore,
    doc,
    setDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import { menuItems } from "./js/menu-data-module.js";

const firebaseConfig = {

    apiKey: "AIzaSyCOigcDG7XiA7gzwjZ0HYN2nNMKmiJlGvY",
    authDomain: "http://lavandacafemenu.firebaseapp.com/",
    projectId: "lavandacafemenu",
    storageBucket: "http://lavandacafemenu.firebasestorage.app/",
    messagingSenderId: "337471082110",
    appId: "1:337471082110:web:8ecb446cfcbc9bd4a9122f"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const status = document.getElementById("status");

document.getElementById("upload").onclick = async () => {

    status.textContent = "Uploading...";

    for(const item of menuItems){

        await setDoc(

            doc(db,"menu",item.id),

            item

        );

    }

    status.textContent =
        "Finished.\n\nEvery menu item has been uploaded.";

};

</script>

</body>
</html>
